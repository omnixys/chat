services:
  chat-postgres:
    image: postgres:18-alpine
    container_name: omnixys-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chat
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - chat-postgres-data:/var/lib/postgresql

  chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnixys-chat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://chat:chat@chat-postgres:5432/chat
      HOST: "0.0.0.0"
      PORT: "8001"
      LOG_LEVEL: INFO
    ports:
      - "8001:8001"
    depends_on:
      chat-postgres:
        condition: service_healthy

volumes:
  chat-postgres-data:
